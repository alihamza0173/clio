name: clio
description: "Manage multiple Claude Code sessions across projects."
publish_to: "none"
version: 0.1.1+1

environment:
  sdk: ^3.12.0

dependencies:
  desktop_drop: ^0.6.0
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_pty: ^0.4.2
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/web_terminal/
    - assets/logos/
  fonts:
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 700
